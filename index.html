<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        li {
            list-style: none;
        }

        a {
            text-decoration: none;
        }

        .news {
            margin: 100px auto;
            width: 360px;
            height: 200px;
        }

        .news .hd {
            height: 34px;
            background-color: #eee;
            border: 1px solid #bddee1;
            border-left: 0;
        }

        .news .hd a {
            margin-top: -1px;
            display: inline-block;
            border-top: 3px solid #ff8400;
            border-right: 1px solid #bddee1;
            width: 48px;
            height: 34px;
            background-color: #fff;
            text-align: center;
            line-height: 32px;
            font-size: 14px;
            color: #333;
        }

        .news .bd {
            padding: 5px;
        }

        .news .bd li {
            padding-left: 15px;
            background-image: url(https://img.jbzj.com/file_images/photoshop/202006/2020060910204498.png);
            background-size: 5px;
            background-repeat: no-repeat;
            background-position: 0 center;
        }

        .news .bd li a{
            padding-left: 20px;
            background-image: url(https://img.jbzj.com/file_images/photoshop/202006/2020060910204498.png);
            background-size: 12px;
            background-repeat: no-repeat;
            background-position: 0 center;
            font-size: 12px;
            color: #666;
            line-height: 24px;
        }

        .news .bd li a:hover{
            color: #ff8400;
        }
    </style>
</head>
<body>
    <div class="news">
        <div class="hd"><a href="#">新闻</a></div>
        <div class="bd">
            <ul>
                <li><a href="#">新闻标题</a></li>
                <li><a href="#">新闻标题</a></li>
                <li><a href="#">新闻标题</a></li>
                <li><a href="#">新闻标题</a></li>
                <li><a href="#">新闻标题</a></li>
                <li><a href="#">新闻标题</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
